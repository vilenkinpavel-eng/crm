async function hashPwd(p){
  if(typeof crypto!=='undefined'&&crypto.subtle){
    try{const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(p));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('')}catch(e){}
  }
  // Fallback: simple hash for non-https
  let h=0;for(let i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h|=0}
  return'fallback_'+Math.abs(h).toString(16);
}

  // Normalize IG tag: extract handle from URL or @handle or plain handle
  function normalizeIgTag(raw){

    const urlMatch=raw.match(/instagram\.com\/([\w.]+)\/?/i);
    if(urlMatch)return '@'+urlMatch[1];
    // @handle
    if(raw.startsWith('@'))return raw;
    // plain handle
    if(/^[\w.]+$/.test(raw))return '@'+raw;
    return raw;
  }
  // Normalize FB tag: keep as link if URL, else @handle

    return '@'+raw;
  }

  // Normalize IG tag: extract handle from URL or @handle or plain handle
  function normalizeIgTag(raw){
    raw=raw.trim();
    if(!raw)return null;
    // Full URL like https://instagram.com/handle or https://www.instagram.com/handle/
    const urlMatch=raw.match(/instagram\.com\/([\w.]+)\/?/i);
    if(urlMatch)return '@'+urlMatch[1];
    // @handle
    if(raw.startsWith('@'))return raw;
    // plain handle
    if(/^[\w.]+$/.test(raw))return '@'+raw;
    return raw;
  }
  // Normalize FB tag: keep as link if URL, else @handle
  function normalizeFbTag(raw){
    raw=raw.trim();
    if(!raw)return null;
    if(raw.startsWith('http')||raw.includes('facebook.com')||raw.includes('fb.com'))return raw;
    if(raw.startsWith('@'))return raw;
    return '@'+raw;
  }

  function renderIgTags(val){
    const sec2=sec('Instagram теги');
    const raw=(val||'').split(/[\s,\n]+/).filter(Boolean);
    const tags=raw.map(normalizeIgTag).filter(Boolean);
    if(!tags.length){sec2.appendChild(el('div',{className:'fv emp',textContent:'—'}));return sec2;}
    const wrap=el('div',{style:'background:#1a1a1a;border:1px solid #2a2a2a;border-radius:7px;padding:6px 10px;margin-bottom:8px'});
    tags.forEach(tag=>{
      const row=el('div',{style:'display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1e1e1e'});
      const sp=el('span',{textContent:tag,style:'color:#ccc;font-size:13px;font-family:monospace;flex:1'});
      const cp2=el('button',{className:'cpb',textContent:'copy'});
      cp2.onclick=()=>{navigator.clipboard.writeText(tag);cp2.textContent='✓';setTimeout(()=>cp2.textContent='copy',1200)};
      row.appendChild(sp);row.appendChild(cp2);wrap.appendChild(row);
    });
    sec2.appendChild(wrap);
    // Copy all as newline-separated (for Stories)
    const cpAll=el('button',{className:'btn btn-sm',textContent:'Copy all (Stories format)',style:'margin-top:4px;width:100%;justify-content:center'});
    cpAll.onclick=()=>{navigator.clipboard.writeText(tags.join('\n'));cpAll.textContent='✓ Copied!';setTimeout(()=>cpAll.textContent='Copy all (Stories format)',1500)};
    sec2.appendChild(cpAll);
    // Copy all space-separated (for post)
    const cpPost=el('button',{className:'btn btn-sm',textContent:'Copy all (post format)',style:'margin-top:4px;width:100%;justify-content:center'});
    cpPost.onclick=()=>{navigator.clipboard.writeText(tags.join(' '));cpPost.textContent='✓ Copied!';setTimeout(()=>cpPost.textContent='Copy all (post format)',1500)};
    sec2.appendChild(cpPost);
    return sec2;
  }

  function renderFbTags(val){
    const sec2=sec('Facebook теги');
    const raw=(val||'').split(/[\s,\n]+/).filter(Boolean);
    const tags=raw.map(normalizeFbTag).filter(Boolean);
    if(!tags.length){sec2.appendChild(el('div',{className:'fv emp',textContent:'—'}));return sec2;}
    const wrap=el('div',{style:'background:#1a1a1a;border:1px solid #2a2a2a;border-radius:7px;padding:6px 10px;margin-bottom:8px'});
    tags.forEach(tag=>{
      const row=el('div',{style:'display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1e1e1e'});
      const isUrl=tag.startsWith('http');
      const sp=isUrl
        ?el('a',{href:tag,target:'_blank',textContent:tag,style:'color:#60a5fa;font-size:11px;font-family:monospace;text-decoration:none;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap'})
        :el('span',{textContent:tag,style:'color:#ccc;font-size:13px;font-family:monospace;flex:1'});
      const cp2=el('button',{className:'cpb',textContent:'copy'});
      cp2.onclick=()=>{navigator.clipboard.writeText(tag);cp2.textContent='✓';setTimeout(()=>cp2.textContent='copy',1200)};
      row.appendChild(sp);row.appendChild(cp2);wrap.appendChild(row);
    });
    sec2.appendChild(wrap);
    const cpAll=el('button',{className:'btn btn-sm',textContent:'Copy all',style:'margin-top:4px;width:100%;justify-content:center'});
    cpAll.onclick=()=>{navigator.clipboard.writeText(tags.join('\n'));cpAll.textContent='✓ Copied!';setTimeout(()=>cpAll.textContent='Copy all',1500)};
    sec2.appendChild(cpAll);
    return sec2;
  }

  c.appendChild(renderIgTags(ev.igTags));
  c.appendChild(renderFbTags(ev.fbTags));
}

    hdr.onclick=()=>{const op=body.style.display!=='none';body.style.display=op?'none':'block';hdr.querySelector('.tog').className='tog'+(op?'':' op')};
