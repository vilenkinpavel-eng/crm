<script type="module">

const PWD_HASH = '9b4c44a5c2c07f6b7e9d3f1a0e8b2d5f4c6e7a8b9d0e1f2a3b4c5d6e7f8a9b0';
const FIN_PWD = 'gjrbeog799';
async function hashPwd(p){
  if(typeof crypto!=='undefined'&&crypto.subtle){
    try{const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(p));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('')}catch(e){}
  }
  // Fallback: simple hash for non-https
  let h=0;for(let i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h|=0}
  return'fallback_'+Math.abs(h).toString(16);
}
function isFinUnlocked(){return sessionStorage.getItem('crm-fin')==='1'}
function unlockFin(){sessionStorage.setItem('crm-fin','1')}

// ── FIREBASE ──────────────────────────────────────────
const firebaseConfig={apiKey:"AIzaSyCRn-Kqn_cawQRG9iwVHZKTWrFfdj2pbPM",authDomain:"connected-crm.firebaseapp.com",projectId:"connected-crm",storageBucket:"connected-os.firebasestorage.app",messagingSenderId:"1026747977280",appId:"1:1026747977280:web:0a891150b5062a9c4ad9a5"};

// ── APP ───────────────────────────────────────────────
const A=appEl;
const COLS=['#E8321E','#FF6B35','#F7931E','#FBBF24','#A3E635','#22C55E','#10B981','#22D3EE','#3B82F6','#818CF8','#A855F7','#E879F9','#F472B6','#FB7185','#94A3B8','#475569'];

];

const TEXT_TYPES=['Анонс','Тизер','Саппорт','Напоминание','Обложка Wire','Основной текст','Афтерпост','Другое'];

let ST={events:[],view:'list',selId:null,ed:null,tab:0,q:'',isnew:false,syncStatus:'loading'};

function mkev(){const cd={},td={};CITIES.forEach(c=>{cd[c]={date:'',venue:'—',venueIG:'',venueFB:''};td[c]={};TICKS[c].forEach(t=>td[c][t]={active:false,url:'',short:''})});td.fanBars={};BARS.forEach(b=>td.fanBars[b]=false);return{id:Date.now()+Math.random().toString(36).slice(2),calNm:'',calCol:'#E8321E',cities:[],cityData:cd,ticketData:td,taplink:'',fbev:'',pressRelease:'',pressKit:'',gdrive:'',aIG:'',aFB:'',aYT:'',aSP:'',aBC:'',aBio:'',aPhotos:'',aPK:'',aPR:'',aTech:'',aHosp:'',aExtra:[],vid1:'',vid2:'',vid3:'',promoters:[{name:'',ig:'',fb:''}],mediaPartners:DEFP.map(mkP),igTags:'',fbTags:'',notes:'',texts:[]}}
function mkP(n=''){return{name:n,website:'',ig:'',fb:'',tiktok:'',yt:'',fromUs:{logo:false,officialPartner:false,promoCode:'',accreditations:'',editorialTickets:'',giveawayTickets:''},fromThem:{banners:false,websiteAnnouncement:false,socialCoposts:false,fbCohost:false,editorial:false,newsletter:false,stories:false},comments:''}}
function fmt(d){if(!d)return'—';return new Date(d+'T00:00:00').toLocaleDateString('ru-RU',{day:'numeric',month:'short',year:'numeric'})}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function cp(t){try{navigator.clipboard.writeText(t)}catch(e){}}
function el(tag,p={}){const e=document.createElement(tag);Object.entries(p).forEach(([k,v])=>{if(k==='html')e.innerHTML=v;else e[k]=v});return e}
function sec(t){const s=el('div',{className:'sec'});s.innerHTML=`<div class="sec-t">${t}</div>`;return s}
function evD(ev){const d=(ev.cities||[]).map(c=>ev.cityData[c]?.date).filter(Boolean).sort();if(!d.length)return'—';return d.length===1?fmt(d[0]):fmt(d[0])+(d[d.length-1]!==d[0]?' — '+fmt(d[d.length-1]):'')}

async function loadFB(){try{setSS('loading');const snap=await getDoc(doc(db,'crm','events'));if(snap.exists()&&snap.data().list)ST.events=snap.data().list;setSS('ok')}catch(e){setSS('err');try{const r=localStorage.getItem('conn-crm-v4');if(r)ST.events=JSON.parse(r)}catch(e2){}}render()}
async function saveFB(){setSS('loading');try{await setDoc(doc(db,'crm','events'),{list:ST.events});localStorage.setItem('conn-crm-v4',JSON.stringify(ST.events));setSS('ok')}catch(e){setSS('err');try{localStorage.setItem('conn-crm-v4',JSON.stringify(ST.events))}catch(e2){}}}
function setSS(s){ST.syncStatus=s;const e=document.querySelector('.sync');if(!e)return;e.className='sync '+s;e.textContent=s==='ok'?'● облако':s==='loading'?'● синхронизация...':'● ошибка связи'}

function render(){A.innerHTML='';
  const h=el('div',{className:'hdr'});h.innerHTML='<div class="hdr-t">CONNECTED<b>.</b>OS</div>';

  const lo=el('button',{className:'logout',textContent:'выйти'});lo.onclick=()=>{sessionStorage.removeItem('crm-auth');location.reload()};hr.appendChild(lo);
  if(ST.view==='list'){
  const b=el('button',{className:'btn btn-p btn-sm',textContent:'+ Ивент'});b.onclick=()=>{ST.ed=mkev();ST.isnew=true;ST.tab=0;ST.view='form';render()};hr.appendChild(b);
  const fb=el('button',{className:'btn btn-sm',textContent:isFinUnlocked()?'💰 Финансы':'🔒 Финансы',style:'font-size:12px'});
  fb.onclick=()=>{if(isFinUnlocked()){ST.view='finance';render()}else{const p=prompt('Финансовый пароль:');if(p===FIN_PWD){unlockFin();ST.view='finance';render()}else if(p!==null)alert('Неверный пароль')}};
  hr.appendChild(fb);

}
  h.appendChild(hr);A.appendChild(h);setSS(ST.syncStatus);

function rList(m){const si=el('input',{className:'srch',type:'text',placeholder:'Поиск...',value:ST.q});si.oninput=e=>{ST.q=e.target.value;rCards(cnt,gd)};m.appendChild(si);const cnt=el('div',{className:'cnt'});m.appendChild(cnt);const gd=el('div',{className:'grid'});m.appendChild(gd);rCards(cnt,gd)}
function rCards(cnt,gd){const q=ST.q.toLowerCase();const evs=ST.events.filter(e=>!q||[e.calNm,...(e.cities||[])].some(v=>v&&v.toLowerCase().includes(q))).sort((a,b)=>{const ad=(a.cities||[]).map(c=>a.cityData[c]?.date).filter(Boolean).sort()[0];const bd=(b.cities||[]).map(c=>b.cityData[c]?.date).filter(Boolean).sort()[0];if(!ad)return 1;if(!bd)return-1;return new Date(ad)-new Date(bd)});cnt.textContent=evs.length+' '+(evs.length===1?'ивент':evs.length<5&&evs.length>1?'ивента':'ивентов');gd.innerHTML='';if(!evs.length){gd.innerHTML='<div class="empty"><h3>Нет ивентов</h3><p>Добавьте первый ивент</p></div>';return}evs.forEach(ev=>{const c=el('div',{className:'card'});c.innerHTML=`<div class="card-top"><div class="dot" style="background:${ev.calCol}"></div><div class="card-nm">${esc(ev.calNm||'Без названия')}</div></div><div class="card-meta"><div style="margin-bottom:3px">${evD(ev)}</div><div>${(ev.cities||[]).map(ct=>`<span class="chip">${ct}</span>`).join('')}</div></div>`;c.onclick=()=>{ST.selId=ev.id;ST.tab=0;ST.view='detail';render()};gd.appendChild(c)})}

// ── QUOTA FORM ────────────────────────────────────────
function rQuotaForm(c,d){
  const bars=['zappa','fomin','skart','crnivan'];
  const barNames={zappa:'Zappa Bar',fomin:'Fomin Bar',skart:'Skart',crnivan:'Crni Ovan'};
  const types=['Regular','Партер','Балкон'];
  let localQ={};
  loadQuotas().then(allQ=>{
    localQ=JSON.parse(JSON.stringify(allQ));
    if(!localQ[d.id])localQ[d.id]={};
    bars.forEach(bk=>{
      if(!localQ[d.id][bk])localQ[d.id][bk]={};
      const s=sec(barNames[bk]);
      function rBarQ(){
        // Remove existing quota rows for this bar
        Array.from(s.children).filter(ch=>ch.dataset.qrow).forEach(ch=>s.removeChild(ch));
        const addBtn2=s.querySelector('.addb-quota');
        Object.entries(localQ[d.id][bk]).forEach(([type,q])=>{
          const wrap=el('div',{className:'box',style:'margin-bottom:8px'});
          wrap.dataset.qrow='1';
          wrap.innerHTML=`<div style="font-weight:500;font-size:13px;margin-bottom:8px">${esc(type)}</div>`;
          const g=el('div',{style:'display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:6px;align-items:end'});
          // qty
          const qf=el('div');qf.innerHTML='<div class="fl">Кол-во</div>';
          const qi=el('input',{className:'fi',type:'number',value:q.qty||'',placeholder:'0',style:'margin:0'});
          qi.oninput=e=>{localQ[d.id][bk][type].qty=parseInt(e.target.value)||0};qf.appendChild(qi);
          // price
          const pf=el('div');pf.innerHTML='<div class="fl">Цена RSD</div>';
          const pi=el('input',{className:'fi',type:'number',value:q.price||'',placeholder:'0',style:'margin:0'});
          pi.oninput=e=>{localQ[d.id][bk][type].price=parseInt(e.target.value)||0};pf.appendChild(pi);
          // discount
          const df=el('div');df.innerHTML='<div class="fl">Скидка RSD</div>';
          const di=el('input',{className:'fi',type:'number',value:q.discount||'',placeholder:'нет',style:'margin:0'});
          di.oninput=e=>{localQ[d.id][bk][type].discount=parseInt(e.target.value)||0};df.appendChild(di);
          // delete
          const delB=el('button',{className:'btn btn-d btn-sm',textContent:'×',style:'margin:0'});
          delB.onclick=()=>{delete localQ[d.id][bk][type];rBarQ()};
          g.appendChild(qf);g.appendChild(pf);g.appendChild(df);g.appendChild(delB);
          wrap.appendChild(g);
          if(s.querySelector('.addb-quota'))s.insertBefore(wrap,s.querySelector('.addb-quota'));
          else s.appendChild(wrap);
        });
      }
      rBarQ();
      // Add type selector
      const addRow=el('div',{style:'display:flex;gap:6px;margin-top:4px'});
      addRow.className='addb-quota';
      const typesel=el('select',{className:'fsel',style:'margin:0'});
      types.forEach(t=>{typesel.appendChild(el('option',{value:t,textContent:t}))});
      const addTypeBtn=el('button',{className:'btn btn-sm',textContent:'+ Тип',style:'white-space:nowrap'});
      addTypeBtn.onclick=()=>{
        const t=typesel.value;
        if(!localQ[d.id][bk][t])localQ[d.id][bk][t]={qty:0,price:0,discount:0};
        rBarQ();
      };
      addRow.appendChild(typesel);addRow.appendChild(addTypeBtn);s.appendChild(addRow);
      c.appendChild(s);
    });
    // Save button
    const saveQ=el('button',{className:'btn btn-p btn-sm',textContent:'✓ Сохранить квоты',style:'margin-top:14px'});
    saveQ.onclick=async()=>{
      await saveQuotas(localQ);
      ST.tab=8;ST.view='detail';render();
    };
    c.appendChild(saveQ);
  });
}

function rFinance(m){
  if(!isFinUnlocked()){ST.view='list';render();return}
  const bk=el('button',{className:'back',textContent:'← Главная'});bk.onclick=()=>{ST.view='list';render()};m.appendChild(bk);
  m.appendChild(el('div',{className:'ev-title',style:'margin-bottom:16px',html:'💰 Продажи в барах'}));

  const BAR_NAMES={zappa:'Zappa Bar',fomin:'Fomin Bar',skart:'Skart',crnivan:'Crni Ovan'};
  const events=ST.events;

  Promise.all([
    loadQuotas(),
    getDoc(doc(db,'sales','data')).then(s=>s.exists()?s.data():{}).catch(()=>({})),
  ]).then(([allQ, allS])=>{
    // local copy for editing
    let editS=JSON.parse(JSON.stringify(allS));

    const upcoming=events.filter(e=>{
      const d=(e.cities||[]).map(c=>e.cityData[c]?.date).filter(Boolean).sort();
      return d.length&&d[0]>='2026-01-01';
    }).filter(e=>Object.entries(BAR_NAMES).some(([bk])=>Object.keys(allQ[e.id]?.[bk]||{}).length))
    .sort((a,b)=>{
      const ad=(a.cities||[]).map(c=>a.cityData[c]?.date).filter(Boolean).sort()[0]||'';
      const bd=(b.cities||[]).map(c=>b.cityData[c]?.date).filter(Boolean).sort()[0]||'';
      return ad.localeCompare(bd);
    });

    if(!upcoming.length){m.innerHTML+='<p class="hint">Нет ивентов с квотами.</p>';return}

    // Summary
    let totalSold=0,totalRevenue=0;
    upcoming.forEach(ev=>{
      Object.entries(BAR_NAMES).forEach(([bk])=>{
        const bq=allQ[ev.id]?.[bk]||{};
        const bs=editS[ev.id]?.[bk]||{};
        Object.entries(bq).forEach(([t,q])=>{const sold=bs[t]||0;totalSold+=sold;totalRevenue+=sold*(q.price||0)});
      });
    });

    const sumRow=el('div',{style:'display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px'});
    const soldCard=el('div',{className:'box',style:'text-align:center'});
    soldCard.innerHTML='<div style="font-size:11px;color:#666;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">Продано билетов</div><div class="fin-total-sold" style="font-size:24px;font-weight:600">'+totalSold+'</div>';
    const revCard=el('div',{className:'box',style:'text-align:center'});
    revCard.innerHTML='<div style="font-size:11px;color:#666;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">Выручка (RSD)</div><div class="fin-total-rev" style="font-size:24px;font-weight:600">'+totalRevenue.toLocaleString('ru-RU')+'</div>';
    sumRow.appendChild(soldCard);sumRow.appendChild(revCard);
    m.appendChild(sumRow);

    function recalcTotals(){
      let ts=0,tr=0;
      upcoming.forEach(ev=>{
        Object.entries(BAR_NAMES).forEach(([bk])=>{
          const bq=allQ[ev.id]?.[bk]||{};
          const bs=editS[ev.id]?.[bk]||{};
          Object.entries(bq).forEach(([t,q])=>{const sold=bs[t]||0;ts+=sold;tr+=sold*(q.price||0)});
        });
      });
      soldCard.querySelector('.fin-total-sold').textContent=ts;
      revCard.querySelector('.fin-total-rev').textContent=tr.toLocaleString('ru-RU');
    }

    upcoming.forEach(ev=>{
      const evQ=allQ[ev.id]||{};
      const dates=(ev.cities||[]).map(c=>ev.cityData[c]?.date).filter(Boolean).sort();
      const s=sec(`${ev.calNm||'—'} · ${dates[0]?new Date(dates[0]+'T00:00:00').toLocaleDateString('ru-RU',{day:'numeric',month:'short'}):''}`);

      const table=el('div',{style:'border:1px solid #2a2a2a;border-radius:8px;overflow:hidden;margin-bottom:4px'});
      const hrow=el('div',{style:'display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr 1fr 80px;gap:0;background:#1a1a1a;padding:7px 12px;font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.05em'});
      ['Бар','Тип','Квота','Продано','Выручка',''].forEach(h=>hrow.appendChild(el('div',{textContent:h})));
      table.appendChild(hrow);

      let evTotal=0;
      Object.entries(BAR_NAMES).forEach(([bk,bn])=>{
        const bq=evQ[bk]||{};
        if(!Object.keys(bq).length)return;
        Object.entries(bq).forEach(([t,q])=>{
          if(!editS[ev.id])editS[ev.id]={};
          if(!editS[ev.id][bk])editS[ev.id][bk]={};
          const sold=editS[ev.id][bk][t]||0;
          const rev=sold*(q.price||0);
          evTotal+=rev;
          const pct=q.qty?Math.round(sold/q.qty*100):0;

          const drow=el('div',{style:'display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr 1fr 80px;gap:0;padding:7px 12px;border-top:1px solid #1a1a1a;font-size:12px;align-items:center;position:relative;padding-bottom:10px'});

          const prog=el('div',{style:`position:absolute;bottom:0;left:0;height:2px;width:${pct}%;background:${pct>80?'#4ade80':pct>50?'#facc15':'#3B82F6'};transition:width .3s`});

          const soldInput=el('input',{className:'fisml',type:'number',value:sold,style:'width:60px;padding:3px 6px;border-radius:4px;border:1px solid #2a2a2a;background:#111;color:#e8e8e8;font-size:12px;font-family:inherit;outline:none'});
          
          const revSpan=el('div',{style:'color:#ccc;font-size:12px'});
          revSpan.textContent=rev?rev.toLocaleString('ru-RU')+' RSD':'—';

          soldInput.oninput=e=>{
            const nv=Math.max(0,parseInt(e.target.value)||0);
            editS[ev.id][bk][t]=nv;
            const nr=nv*(q.price||0);
            revSpan.textContent=nr?nr.toLocaleString('ru-RU')+' RSD':'—';
            const np=q.qty?Math.round(nv/q.qty*100):0;
            prog.style.width=np+'%';
            prog.style.background=np>80?'#4ade80':np>50?'#facc15':'#3B82F6';
            // update evTotal display
            let et=0;
            Object.entries(evQ).forEach(([bar,bqv])=>{
              Object.entries(bqv).forEach(([tp,qv])=>{et+=(editS[ev.id][bar]?.[tp]||0)*(qv.price||0)});
            });
            if(totDiv)totDiv.textContent='Итого: '+et.toLocaleString('ru-RU')+' RSD';
            recalcTotals();
          };

          drow.innerHTML=`<div style="color:#ccc">${bn}</div><div style="color:#888">${esc(t)}</div><div style="color:#888">${q.qty||0}</div>`;
          drow.appendChild(soldInput);
          drow.appendChild(revSpan);

          // Save button per row
          const saveBtn=el('button',{className:'btn btn-sm',textContent:'✓',style:'padding:2px 8px;font-size:11px'});
          saveBtn.onclick=async()=>{
            saveBtn.textContent='...';saveBtn.disabled=true;
            try{
              await setDoc(doc(db,'sales','data'),editS);
              // Log to history
              await addDoc(collection(db,'sales_history'),{
                evId:ev.id,barKey:bk,barName:bn,ticketType:t,
                total:editS[ev.id][bk][t],
                isManual:true,source:'os',
                timestamp:new Date().toISOString(),
                date:new Date().toISOString().split('T')[0]
              }).catch(()=>{});
              saveBtn.textContent='✓';saveBtn.style.color='#4ade80';
              loadLog();
              setTimeout(()=>{saveBtn.textContent='✓';saveBtn.style.color='';saveBtn.disabled=false},2000);
            }catch(e){saveBtn.textContent='!';saveBtn.disabled=false}
          };
          drow.appendChild(saveBtn);
          drow.appendChild(prog);
          table.appendChild(drow);
        });
      });
      s.appendChild(table);
      const totDiv=el('div',{style:'text-align:right;font-size:12px;color:#888;padding:4px 0'});
      totDiv.textContent=evTotal?'Итого: '+evTotal.toLocaleString('ru-RU')+' RSD':'';
      s.appendChild(totDiv);
      m.appendChild(s);
    });

    // Save all button
    const saveAllBtn=el('button',{className:'btn btn-p btn-sm',textContent:'✓ Сохранить все изменения',style:'margin-top:16px;width:100%'});
    saveAllBtn.onclick=async()=>{
      saveAllBtn.textContent='Сохраняем...';saveAllBtn.disabled=true;
      try{
        await setDoc(doc(db,'sales','data'),editS);
        saveAllBtn.textContent='✓ Сохранено';
        loadLog();
        setTimeout(()=>{saveAllBtn.textContent='✓ Сохранить все изменения';saveAllBtn.disabled=false},2000);
      }catch(e){saveAllBtn.textContent='Ошибка';saveAllBtn.disabled=false}
    };
    m.appendChild(saveAllBtn);

    // ── SALES LOG ──────────────────────────────────────
    const logSec=sec('Лог продаж');
    logSec.style.marginTop='24px';
    const logWrap=el('div');
    logSec.appendChild(logWrap);
    m.appendChild(logSec);

    // Sales log from sales_history collection
    const loadLog=async()=>{
      logWrap.innerHTML='<div style="font-size:12px;color:#666;padding:8px 0">Загрузка...</div>';
      try{
        let histRows=[];
        try{
          const q2=query(collection(db,'sales_history'),orderBy('timestamp','desc'),limit(200));
          const snap2=await getDocs(q2);
          snap2.forEach(d=>histRows.push({id:d.id,...d.data()}));
        }catch(e2){
          try{
            const snap2=await getDocs(collection(db,'sales_history'));
            snap2.forEach(d=>histRows.push({id:d.id,...d.data()}));
            histRows.sort((a,b)=>(b.timestamp||'').localeCompare(a.timestamp||''));
          }catch(e3){}
        }
        logWrap.innerHTML='';
        const BAR_NAMES2={zappa:'Zappa Bar',fomin:'Fomin Bar',skart:'Skart',crnivan:'Crni Ovan'};
        const evMap2={};ST.events.forEach(e=>evMap2[e.id]=e.calNm||e.id);
        if(!histRows.length){logWrap.innerHTML='<div class="fv emp" style="text-align:center;padding:16px">Нет данных о продажах</div>';return}
        const logHeader=el('div',{style:'display:grid;grid-template-columns:90px 1fr 1fr 80px 60px 90px 36px;gap:0;background:#1a1a1a;padding:6px 10px;font-size:10px;color:#555;text-transform:uppercase;border-radius:7px 7px 0 0;border:1px solid #2a2a2a;border-bottom:none'});
        ['Дата','Место','Ивент','Тип','Кол-во','Источник',''].forEach(h=>logHeader.appendChild(el('div',{textContent:h})));
        logWrap.appendChild(logHeader);
        const logBody=el('div',{style:'border:1px solid #2a2a2a;border-radius:0 0 7px 7px;overflow:hidden'});
        histRows.forEach((row,idx)=>{
          const drow=el('div',{style:'display:grid;grid-template-columns:90px 1fr 1fr 80px 60px 90px 36px;gap:0;padding:7px 10px;border-top:'+(idx?'1px solid #1a1a1a':'none')+';font-size:12px;align-items:center'});
          const dateDisp=row.date?new Date(row.date+'T00:00:00').toLocaleDateString('ru-RU',{day:'numeric',month:'short'}):row.timestamp?new Date(row.timestamp).toLocaleDateString('ru-RU',{day:'numeric',month:'short'}):'—';
          const placeName=BAR_NAMES2[row.barKey]||row.barName||row.barKey||'—';
          const evName=evMap2[row.evId]||row.evId||'—';
          const tickType=row.ticketType||row.tp||'—';
          const qty=row.qty!==undefined?row.qty:(row.total!==undefined?row.total:'—');
          const src=row.source==='os'?'✏ OS':'🤖 бот';
          const delLogBtn=el('button',{className:'cpb',textContent:'×',style:'color:#444;font-size:13px;justify-self:end'});
          delLogBtn.onclick=async()=>{
            if(!confirm('Удалить запись из лога?')) return;
            try{
              await deleteDoc(doc(db,'sales_history',row.id));
              drow.style.opacity='0.3';setTimeout(()=>drow.remove(),400);
            }catch(e){}
          };
          drow.innerHTML='<div style="color:#666">'+dateDisp+'</div><div style="color:#888">'+esc(placeName)+'</div><div style="color:#ccc">'+esc(evName)+'</div><div style="color:#888">'+esc(tickType)+'</div><div style="color:#ccc">'+qty+'</div><div style="color:#555;font-size:11px">'+src+'</div>';
          drow.appendChild(delLogBtn);
          logBody.appendChild(drow);
        });
        logWrap.appendChild(logBody);
      }catch(e){logWrap.innerHTML='<div class="fv emp">Ошибка загрузки лога: '+e.message+'</div>'}
    };
    loadLog();

    // ── COLLECTIONS LOG ────────────────────────────────
    const colSec=sec('Инкассации');
    colSec.style.marginTop='24px';
    const colWrap=el('div');
    colSec.appendChild(colWrap);
    m.appendChild(colSec);

    const loadCols=async()=>{
      colWrap.innerHTML='<div style="font-size:12px;color:#666;padding:8px 0">Загрузка...</div>';
      try{
        let cols=[];
        try{
          const colQ=query(collection(db,'collections'),orderBy('timestamp','desc'),limit(200));
          const snap=await getDocs(colQ);
          snap.forEach(d=>cols.push({id:d.id,...d.data()}));
        }catch(e2){
          try{
            const snap=await getDocs(collection(db,'collections'));
            snap.forEach(d=>cols.push({id:d.id,...d.data()}));
            cols.sort((a,b)=>(b.timestamp||'').localeCompare(a.timestamp||''));
          }catch(e3){}
        }
        const salesSnap=await getDoc(doc(db,'sales','data')).catch(()=>null);
        const salesData=salesSnap&&salesSnap.exists()?salesSnap.data():{};
        const BAR_NAMES3={zappa:'Zappa Bar',fomin:'Fomin Bar',skart:'Skart',crnivan:'Crni Ovan'};
        const evMapFull={};ST.events.forEach(e=>evMapFull[e.id]=e);
        colWrap.innerHTML='';

        // Status summary: К инкассации / Долг / Закрыто
        const summaryRows=[];
        upcoming.forEach(ev=>{
          const evQ=allQ[ev.id]||{};
          Object.entries(BAR_NAMES3).forEach(([bk,bn])=>{
            const bq=evQ[bk]||{};
            if(!Object.keys(bq).length) return;
            const bs=salesData[ev.id]?.[bk]||{};
            let expected=0;
            Object.entries(bq).forEach(([t,qv])=>{expected+=(bs[t]||0)*(qv.price||0)});
            if(!expected) return;
            const evCols=cols.filter(c=>c.evId===ev.id&&c.barKey===bk);
            const collected=evCols.reduce((a,c)=>a+(c.amount||0),0);
            const diff=expected-collected;
            // hadCollection: была ли хоть одна инкассация по этому бару+ивенту
            const hadCollection=evCols.length>0;
            summaryRows.push({ev,bk,bn,expected,collected,diff,hadCollection});
          });
        });

        if(summaryRows.length){
          const smH=el('div',{style:'display:grid;grid-template-columns:1fr 1fr 80px 80px 1fr;gap:0;background:#1a1a1a;padding:6px 10px;font-size:10px;color:#555;text-transform:uppercase;border-radius:7px 7px 0 0;border:1px solid #2a2a2a;border-bottom:none'});
          ['Место','Ивент','Ожидается','Получено','Статус'].forEach(h=>smH.appendChild(el('div',{textContent:h})));
          colWrap.appendChild(smH);
          const smB=el('div',{style:'border:1px solid #2a2a2a;border-radius:0 0 7px 7px;overflow:hidden;margin-bottom:16px'});
          summaryRows.forEach((row,idx)=>{
            const drow=el('div',{style:'display:grid;grid-template-columns:1fr 1fr 80px 80px 1fr;gap:0;padding:7px 10px;border-top:'+(idx?'1px solid #1a1a1a':'none')+';font-size:12px;align-items:center'});
            let statusHtml;
            if(row.diff<=0){
              statusHtml='<span style="color:#4ade80;font-size:11px">✅ Закрыто</span>';
            } else if(row.hadCollection){
              // была инкассация, но сумма не сошлась
              statusHtml='<span style="color:#f87171;font-size:11px">⚠️ Долг: '+row.diff.toLocaleString('ru-RU')+' RSD</span>';
            } else {
              // инкассации ещё не было
              statusHtml='<span style="color:#facc15;font-size:11px">📋 К инкассации: '+row.diff.toLocaleString('ru-RU')+' RSD</span>';
            }
            drow.innerHTML='<div style="color:#888">'+esc(row.bn)+'</div><div style="color:#ccc">'+esc(row.ev.calNm)+'</div>'
              +'<div style="color:#666">'+row.expected.toLocaleString('ru-RU')+'</div>'
              +'<div style="color:#ccc">'+row.collected.toLocaleString('ru-RU')+'</div>'+statusHtml;
            smB.appendChild(drow);
          });
          // Totals row
          const totalsRow=el('div',{style:'display:flex;gap:16px;justify-content:flex-end;padding:6px 0;margin-top:-10px;margin-bottom:16px;font-size:12px'});
          let sumPending=0,sumDebt=0;
          summaryRows.forEach(row=>{
            if(row.diff>0&&!row.hadCollection) sumPending+=row.diff;
            else if(row.diff>0&&row.hadCollection) sumDebt+=row.diff;
          });
          if(sumPending>0) totalsRow.innerHTML+='<span style="color:#facc15">📋 К инкассации: <b>'+sumPending.toLocaleString('ru-RU')+' RSD</b></span>';
          if(sumDebt>0) totalsRow.innerHTML+='<span style="color:#f87171">⚠️ Долг: <b>'+sumDebt.toLocaleString('ru-RU')+' RSD</b></span>';
          colWrap.appendChild(smB);
          if(sumPending>0||sumDebt>0) colWrap.appendChild(totalsRow);
        }

        // ── Add new collection form ──────────────────────────
        const addColSec=el('div',{style:'background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:12px;margin-bottom:16px'});
        const addColTitle=el('div',{style:'font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px',textContent:'+ Добавить инкассацию'});
        addColSec.appendChild(addColTitle);
        const addRow=el('div',{style:'display:grid;grid-template-columns:1fr 1fr 90px 90px 70px auto;gap:6px;align-items:center'});
        // Bar select
        const barSel=el('select',{className:'fisml',style:'font-size:12px'});
        [['','— Бар —'],['fomin','Fomin Bar'],['skart','Skart'],['zappa','Zappa Bar'],['crnivan','Crni Ovan']].forEach(([v,l])=>{
          const o=el('option',{value:v,textContent:l});barSel.appendChild(o);
        });
        // Event select
        const evSel=el('select',{className:'fisml',style:'font-size:12px'});
        const evOptDef=el('option',{value:'',textContent:'— Ивент —'});evSel.appendChild(evOptDef);
        upcoming.forEach(ev=>{const o=el('option',{value:ev.id,textContent:ev.calNm});evSel.appendChild(o);});
        // Amount
        const amtNew=el('input',{className:'fisml',type:'number',placeholder:'Сумма RSD',style:'font-size:12px'});
        // Who
        const whoNew=el('input',{className:'fisml',type:'text',placeholder:'Кто',style:'font-size:12px'});
        // Date
        const dateNew=el('input',{className:'fisml',type:'date',value:new Date().toISOString().split('T')[0],style:'font-size:12px'});
        // Save btn
        const addBtn=el('button',{className:'btn',textContent:'+ Добавить',style:'font-size:12px;padding:4px 10px'});
        addBtn.onclick=async()=>{
          const bk=barSel.value,evId=evSel.value,amt=parseInt(amtNew.value)||0,who=whoNew.value.trim(),dt=dateNew.value;
          if(!bk||!evId||!amt){addBtn.style.color='#f87171';setTimeout(()=>addBtn.style.color='',1500);return;}
          addBtn.textContent='...';addBtn.disabled=true;
          try{
            await addDoc(collection(db,'collections'),{
              barKey:bk,barName:BAR_NAMES3[bk]||bk,
              evId,amount:amt,collectedBy:who||'OS',
              date:dt,timestamp:new Date().toISOString(),source:'os'
            });
            amtNew.value='';whoNew.value='';
            addBtn.textContent='✓';addBtn.style.color='#4ade80';
            setTimeout(()=>{addBtn.textContent='+ Добавить';addBtn.style.color='';addBtn.disabled=false;loadCols();},1200);
          }catch(e){addBtn.textContent='!';addBtn.disabled=false;}
        };
        addRow.appendChild(barSel);addRow.appendChild(evSel);addRow.appendChild(amtNew);addRow.appendChild(whoNew);addRow.appendChild(dateNew);addRow.appendChild(addBtn);
        addColSec.appendChild(addRow);
        colWrap.appendChild(addColSec);

        // ── History ──────────────────────────────────────────
        if(cols.length){
          const histT=el('div',{style:'font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px',textContent:'История инкассаций'});
          colWrap.appendChild(histT);
          const colHeader=el('div',{style:'display:grid;grid-template-columns:80px 1fr 1fr 90px 70px 60px 36px;gap:0;background:#1a1a1a;padding:6px 10px;font-size:10px;color:#555;text-transform:uppercase;border-radius:7px 7px 0 0;border:1px solid #2a2a2a;border-bottom:none'});
          ['Дата','Место','Ивент','Сумма','Кто','',''].forEach(h=>colHeader.appendChild(el('div',{textContent:h})));
          colWrap.appendChild(colHeader);
          let totalCol=0;
          const colBody=el('div',{style:'border:1px solid #2a2a2a;border-radius:0 0 7px 7px;overflow:hidden'});
          cols.forEach((col,idx)=>{
            totalCol+=col.amount||0;
            const evName=(evMapFull[col.evId]?.calNm)||col.evId||'—';
            const drow=el('div',{style:'display:grid;grid-template-columns:80px 1fr 1fr 90px 70px 60px 36px;gap:0;padding:7px 10px;border-top:'+(idx?'1px solid #1a1a1a':'none')+';font-size:12px;align-items:center'});
            const amtInput=el('input',{className:'fisml',type:'number',value:col.amount||0,style:'width:70px'});
            const saveColBtn=el('button',{className:'cpb',textContent:'✓',style:'margin-right:2px'});
            saveColBtn.onclick=async()=>{
              const nv=parseInt(amtInput.value)||0;
              saveColBtn.textContent='...';
              try{
                await updateDoc(doc(db,'collections',col.id),{amount:nv,updatedAt:new Date().toISOString()});
                saveColBtn.textContent='✓';saveColBtn.style.color='#4ade80';
                setTimeout(()=>{saveColBtn.textContent='✓';saveColBtn.style.color='';loadCols();},1500);
              }catch(e){saveColBtn.textContent='!';}
            };
            
            const delBtn=el('button',{className:'cpb',textContent:'×',style:'color:#555;font-size:14px'});
            delBtn.onclick=async()=>{
              if(!confirm('Удалить эту инкассацию?')) return;
              delBtn.textContent='...';
              try{
                await deleteDoc(doc(db,'collections',col.id));
                loadCols();
              }catch(e){delBtn.textContent='×';}
            };
            drow.innerHTML='<div style="color:#666">'+(col.date||'—')+'</div>'
              +'<div style="color:#888">'+esc(BAR_NAMES3[col.barKey]||col.barKey||'—')+'</div>'
              +'<div style="color:#ccc">'+esc(evName)+'</div>';
            drow.appendChild(amtInput);
            drow.innerHTML+='<div style="color:#888;font-size:12px;padding:0 4px">'+esc(col.collectedBy||'—')+'</div>';
            drow.appendChild(saveColBtn);
            drow.appendChild(delBtn);
            colBody.appendChild(drow);
          });
          colWrap.appendChild(colBody);
          const totRow=el('div',{style:'text-align:right;font-size:12px;color:#888;padding:6px 0'});
          totRow.textContent='Итого инкассировано: '+totalCol.toLocaleString('ru-RU')+' RSD';
          colWrap.appendChild(totRow);
        } else if(!summaryRows.length){
          colWrap.innerHTML='<div class="fv emp" style="text-align:center;padding:16px">Нет инкассаций</div>';
        }
      }catch(e){colWrap.innerHTML='<div class="fv emp">Ошибка: '+e.message+'</div>'}
    };
    loadCols();

  }).catch(e=>{m.innerHTML+='<p class="hint" style="color:#f87171">Ошибка: '+e.message+'</p>'});
}
function init(){render();loadFB()}

// ── SESSION CHECK ─────────────────────────────────────
if(sessionStorage.getItem('crm-auth')==='1'){
  loginEl.style.display='none';
  appEl.style.display='block';
  init();
}
</script>
</body>
</html>
